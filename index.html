<!DOCTYPE html>
<html>
<head>
    <title>Arqueología de Guatemala - Catálogo</title>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; height: 100vh; }
        
        #sidebar { width: 300px; background: #f8f9fa; border-right: 1px solid #ddd; overflow-y: auto; padding: 20px; box-shadow: 2px 0 5px rgba(0,0,0,0.1); z-index: 1000; }
        
        #map { flex-grow: 1; height: 100%; }

        h1 { font-size: 1.2rem; color: #2c3e50; border-bottom: 2px solid #27ae60; padding-bottom: 10px; }
        .site-item { padding: 10px; border-bottom: 1px solid #eee; cursor: pointer; transition: background 0.2s; }
        .site-item:hover { background: #e9ecef; }
        .site-item b { color: #27ae60; }
        .municipio-tag { font-size: 0.8rem; color: #7f8c8d; display: block; }

        /* Estilos del Visor de Ficha */
        #ficha-container { 
            display:none; 
            position:fixed; 
            top:10%; 
            left:15%; 
            width:70%; 
            height:80%; 
            background:white; 
            z-index:2000; 
            padding:30px; 
            border-radius:10px; 
            box-shadow: 0 0 30px rgba(0,0,0,0.5); 
            overflow-y:auto; 
        }
        #contenido-ficha img { max-width: 100%; height: auto; } /* Para tus fotos de la GoPro */
    </style>
</head>
<body>

    <div id="sidebar">
        <h1>Sitios: Depto. Guatemala</h1>
        <div id="site-list">
            <p>Cargando sitios...</p>
        </div>
    </div>

    <div id="map"></div>

    <div id="ficha-container">
        <button onclick="document.getElementById('ficha-container').style.display='none'" style="float:right; background:#e74c3c; color:white; border:none; padding:10px 15px; cursor:pointer; border-radius:5px; font-weight:bold;">Cerrar ✕</button>
        <div id="contenido-ficha"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 1. Configuración del Mapa
        var map = L.map('map').setView([14.63, -90.51], 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // 2. Función para cargar y mostrar el Markdown (El Visor)
        function verFicha(urlRelativa) {
            // Ajustamos la ruta para asegurarnos de leer el archivo .md
            const urlMD = urlRelativa.replace('.html', '.md');
            
            fetch(urlMD)
                .then(res => {
                    if (!res.ok) throw new Error("No se encontró el archivo");
                    return res.text();
                })
                .then(text => {
                    // Quitamos el encabezado YAML (lo que está entre ---)
                    const cleanText = text.replace(/^---[\s\S]*?---/, '');
                    // Convertimos a HTML
                    document.getElementById('contenido-ficha').innerHTML = marked.parse(cleanText);
                    document.getElementById('ficha-container').style.display = 'block';
                })
                .catch(err => {
                    console.error(err);
                    alert("Error al cargar la ficha técnica de Acatán. Revisa que el archivo .md exista en la carpeta.");
                });
        }

        // 3. Cargar Datos del GeoJSON
        fetch('mapa.geojson')
            .then(res => res.json())
            .then(data => {
                var listContainer = document.getElementById('site-list');
                listContainer.innerHTML = '';

                L.geoJSON(data, {
                    onEachFeature: function (feature, layer) {
                        var props = feature.properties;
                        var coords = feature.geometry.coordinates;

                        // Crear item en la lista lateral
                        var div = document.createElement('div');
                        div.className = 'site-item';
                        div.innerHTML = `<b>${props.name}</b><span class="municipio-tag">${props.municipio || 'Guatemala'}</span>`;
                        
                        div.onclick = function() {
                            map.flyTo([coords[1], coords[0]], 15);
                            layer.openPopup();
                        };
                        listContainer.appendChild(div);

                        // Crear Popup con botón para el Visor
                        layer.bindPopup(`
                            <div style="text-align:center">
                                <b>${props.name}</b><br>
                                <button onclick="verFicha('${props.url}')" style="margin-top:10px; cursor:pointer; background:#27ae60; color:white; border:none; padding:5px 10px; border-radius:3px;">Ver Ficha Técnica</button>
                            </div>
                        `);
                    }
                }).addTo(map);
            });
    </script>
</body>
</html>
